<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Life Manager 백업 복원 도구</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; background: #f5f5f5; }
  h2 { color: #333; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
  select, button { font-size: 15px; padding: 10px 16px; border-radius: 8px; border: 1px solid #ccc; margin: 8px 0; }
  button { background: #4285f4; color: #fff; border: none; cursor: pointer; }
  button:hover { background: #3367d6; }
  button.danger { background: #e53935; }
  button.danger:hover { background: #c62828; }
  #status { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
  .ok { background: #e8f5e9; color: #2e7d32; }
  .err { background: #ffebee; color: #c62828; }
  .info { background: #e3f2fd; color: #1565c0; }
  label { font-weight: bold; display: block; margin-top: 12px; }
  .field-list { font-size: 13px; color: #555; margin-top: 8px; }
  input[type=checkbox] { margin-right: 6px; }
  .warn { background: #fff8e1; color: #e65100; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
</style>
</head>
<body>
<h2>🔄 Life Manager 백업 복원 도구</h2>

<div class="card">
  <div class="warn">⚠️ 복원하면 현재 <code>main</code> 데이터가 덮어씌워집니다. 신중하게 사용하세요.</div>
  <div class="warn" style="background:#fce4ec;color:#b71c1c;">🚨 복원 전에 반드시 앱 탭(<code>pdjhi.github.io/lifemanager/</code>)을 먼저 닫아주세요. 앱이 열려있으면 복원 후 데이터가 다시 덮어씌워질 수 있습니다.</div>

  <div id="login-section">
    <p>Google 계정으로 로그인하세요.</p>
    <button id="btn-login">Google 로그인</button>
  </div>

  <div id="restore-section" style="display:none">
    <p>✅ 로그인됨: <strong id="user-email"></strong></p>

    <label>복원할 백업 날짜</label>
    <select id="backup-select"><option value="">-- 날짜 선택 --</option></select>
    <button id="btn-load-backups">백업 목록 불러오기</button>

    <div id="field-section" style="display:none; margin-top:16px;">
      <label>복원할 항목 선택 (전체 또는 일부)</label>
      <div class="field-list" id="field-list"></div>
      <br>
      <button class="danger" id="btn-restore">선택한 항목 복원하기</button>
    </div>
  </div>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDZ7EjyhLwti7Sp1kZJtlWIR0diiXkR7Uk",
  authDomain: "my-life-manager-ed18a.firebaseapp.com",
  projectId: "my-life-manager-ed18a",
  storageBucket: "my-life-manager-ed18a.firebasestorage.app",
  messagingSenderId: "211027712302",
  appId: "1:211027712302:web:ba3e22741fbd569e9ac2bf"
});

const auth = getAuth(app);
const db = getFirestore(app);
const ALLOWED = 'jihoe1125@gmail.com';

const FIELD_LABELS = {
  retroWeeklyContent: '주간 회고 내용',
  retroWeeklyMeta: '주간 회고 메타',
  retroMonthlyData: '월간 회고',
  retroQuarterlyData: '분기 회고',
  retroYearlyData: '연간 회고',
  retroStore: '회고 저장소',
  todoStore: '할 일 (Todo)',
  oneThingStore: '원씽',
  oneThingDone: '원씽 달성',
  routines: '루틴',
  routineCheckData: '루틴 체크',
  diaryStore: '일기',
  tlLogs: '시간가계부 로그',
  tlCatParents: '시간가계부 대분류',
  tlCatChildren: '시간가계부 소분류',
  yearlyGoalsData: '연간 목표',
  qGoalsData: '분기 목표',
  mGoalsData: '월간 목표',
  wfStore: '위시/주간 계획',
  streakData: '스트릭',
  desireStore: '욕구 저장소',
  buyStore: '구매 목록',
  affirmationStore: '확언',
};

function status(msg, type='info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}

let currentUid = null;
let backupData = null;

document.getElementById('btn-login').addEventListener('click', async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) {
    status('로그인 실패: ' + e.message, 'err');
  }
});

onAuthStateChanged(auth, user => {
  if (user && user.email === ALLOWED) {
    currentUid = user.uid;
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('restore-section').style.display = 'block';
    document.getElementById('user-email').textContent = user.email;
    status('로그인 완료. 백업 목록을 불러오세요.', 'ok');
  }
});

document.getElementById('btn-load-backups').addEventListener('click', async () => {
  if (!currentUid) return;
  status('백업 목록 불러오는 중...', 'info');
  try {
    const snap = await getDocs(collection(db, 'users', currentUid, 'backups'));
    const dates = snap.docs.map(d => d.id).sort().reverse();
    const sel = document.getElementById('backup-select');
    sel.innerHTML = '<option value="">-- 날짜 선택 --</option>';
    dates.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      sel.appendChild(opt);
    });
    status(`백업 ${dates.length}개 발견: ${dates.join(', ')}`, 'ok');
  } catch(e) {
    status('백업 목록 불러오기 실패: ' + e.message, 'err');
  }
});

document.getElementById('backup-select').addEventListener('change', async function() {
  const date = this.value;
  if (!date || !currentUid) return;
  status('백업 데이터 불러오는 중...', 'info');
  try {
    const snap = await getDoc(doc(db, 'users', currentUid, 'backups', date));
    if (!snap.exists()) { status('해당 날짜 백업 없음', 'err'); return; }
    backupData = snap.data();

    const fieldSection = document.getElementById('field-section');
    const fieldList = document.getElementById('field-list');
    fieldList.innerHTML = '';

    Object.keys(FIELD_LABELS).forEach(key => {
      if (backupData[key] !== undefined) {
        const label = document.createElement('label');
        label.style.fontWeight = 'normal';
        label.style.marginTop = '4px';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = key;
        cb.id = 'cb_' + key;
        // 주간회고는 기본 체크
        if (key.startsWith('retro')) cb.checked = true;
        label.appendChild(cb);
        label.appendChild(document.createTextNode(FIELD_LABELS[key] + ' (' + key + ')'));
        fieldList.appendChild(label);
      }
    });

    fieldSection.style.display = 'block';
    status(`${date} 백업 로드 완료. 복원할 항목을 선택하세요.`, 'ok');
  } catch(e) {
    status('백업 불러오기 실패: ' + e.message, 'err');
  }
});

document.getElementById('btn-restore').addEventListener('click', async () => {
  if (!backupData || !currentUid) return;

  const checked = Array.from(document.querySelectorAll('#field-list input:checked')).map(cb => cb.value);
  if (checked.length === 0) { status('복원할 항목을 하나 이상 선택하세요.', 'err'); return; }

  if (!confirm(`앱 탭(pdjhi.github.io/lifemanager/)을 닫으셨나요?\n\n닫지 않으셨다면 취소 후 앱 탭을 먼저 닫아주세요.`)) return;
  if (!confirm(`[${checked.map(k => FIELD_LABELS[k]).join(', ')}] 항목을 복원할까요?\n현재 데이터가 덮어씌워집니다.`)) return;

  status('복원 중...', 'info');
  try {
    // 현재 main 불러오기
    const mainSnap = await getDoc(doc(db, 'users', currentUid, 'data', 'main'));
    const current = mainSnap.exists() ? mainSnap.data() : {};

    // 선택된 필드만 백업 데이터로 교체
    const merged = { ...current };
    checked.forEach(key => { merged[key] = backupData[key]; });
    merged._savedAt = Date.now();

    await setDoc(doc(db, 'users', currentUid, 'data', 'main'), merged);
    status('✅ 복원 완료! 앱을 새로고침하면 데이터가 반영됩니다.', 'ok');
  } catch(e) {
    status('복원 실패: ' + e.message, 'err');
  }
});
</script>
</body>
</html>
